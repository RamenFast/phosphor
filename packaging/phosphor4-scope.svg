<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 256 256" width="256" height="256">
  <!-- Phosphor v4 icon: four scope views, one per quadrant, each the
       signature shape of a display mode. Deep CRT black; every trace
       wears its own phosphor colour (drawn from the app's theme presets)
       with a saturated soft halo and a bright core. Sharp corners
       (the house rule); neutral hairline divider grid + outer frame. -->
  <defs>
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
    <filter id="core" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.55"/>
    </filter>
    <filter id="dot" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>

    <!-- top-left: XY knot — a true CLOSED 3:2 lissajous (the open
         v4.2.0 path dangled a stroke end at its left extremity and
         read as "cut off"; closed, nothing dangles anywhere) -->
    <g id="g-knot">
      <path d="M 113.0 68.0 L 112.4 72.0 L 110.8 75.9 L 108.1 79.7 L 104.4 83.5 L 99.8 87.0 L 94.5 90.3 L 88.4 93.4 L 81.9 96.2 L 75.0 98.7 L 68.0 100.9 L 61.0 102.7 L 54.1 104.1 L 47.6 105.2 L 41.5 105.8 L 36.2 106.0 L 31.6 105.8 L 27.9 105.2 L 25.2 104.1 L 23.6 102.7 L 23.0 100.9 L 23.6 98.7 L 25.2 96.2 L 27.9 93.4 L 31.6 90.3 L 36.2 87.0 L 41.5 83.5 L 47.6 79.7 L 54.1 75.9 L 61.0 72.0 L 68.0 68.0 L 75.0 64.0 L 81.9 60.1 L 88.4 56.3 L 94.5 52.5 L 99.8 49.0 L 104.4 45.7 L 108.1 42.6 L 110.8 39.8 L 112.4 37.3 L 113.0 35.1 L 112.4 33.3 L 110.8 31.9 L 108.1 30.8 L 104.4 30.2 L 99.8 30.0 L 94.5 30.2 L 88.4 30.8 L 81.9 31.9 L 75.0 33.3 L 68.0 35.1 L 61.0 37.3 L 54.1 39.8 L 47.6 42.6 L 41.5 45.7 L 36.2 49.0 L 31.6 52.5 L 27.9 56.3 L 25.2 60.1 L 23.6 64.0 L 23.0 68.0 L 23.6 72.0 L 25.2 75.9 L 27.9 79.7 L 31.6 83.5 L 36.2 87.0 L 41.5 90.3 L 47.6 93.4 L 54.1 96.2 L 61.0 98.7 L 68.0 100.9 L 75.0 102.7 L 81.9 104.1 L 88.4 105.2 L 94.5 105.8 L 99.8 106.0 L 104.4 105.8 L 108.1 105.2 L 110.8 104.1 L 112.4 102.7 L 113.0 100.9 L 112.4 98.7 L 110.8 96.2 L 108.1 93.4 L 104.4 90.3 L 99.8 87.0 L 94.5 83.5 L 88.4 79.7 L 81.9 75.9 L 75.0 72.0 L 68.0 68.0 L 61.0 64.0 L 54.1 60.1 L 47.6 56.3 L 41.5 52.5 L 36.2 49.0 L 31.6 45.7 L 27.9 42.6 L 25.2 39.8 L 23.6 37.3 L 23.0 35.1 L 23.6 33.3 L 25.2 31.9 L 27.9 30.8 L 31.6 30.2 L 36.2 30.0 L 41.5 30.2 L 47.6 30.8 L 54.1 31.9 L 61.0 33.3 L 68.0 35.1 L 75.0 37.3 L 81.9 39.8 L 88.4 42.6 L 94.5 45.7 L 99.8 49.0 L 104.4 52.5 L 108.1 56.3 L 110.8 60.1 L 112.4 64.0 Z"/>
    </g>

    <!-- top-right: Takens torus (a projected donut knot) + ellipse -->
    <g id="g-torus" transform="translate(186,76) scale(1.35) translate(-189,-70)">
      <path d="M 168 40 C 210 40, 224 64, 200 82 C 176 100, 150 78, 168 60
               C 186 42, 218 58, 206 76"/>
      <ellipse cx="192" cy="64" rx="30" ry="16" opacity="0.55"/>
    </g>

    <!-- bottom-left: waveform (taller amplitude reads better small) -->
    <path id="g-wave" transform="translate(68,186) scale(1.12,1.92) translate(-64,-191)"
          d="M 20 192 L 34 192 L 40 168 L 50 214 L 60 176 L 70 206
             L 80 184 L 92 192 L 108 192"/>

    <!-- bottom-right: radial spectrum (rays from a centre) -->
    <g id="g-radial" transform="translate(185,185) scale(1.33) translate(-192,-192)">
      <line x1="192" y1="192" x2="192" y2="156"/>
      <line x1="192" y1="192" x2="222" y2="174"/>
      <line x1="192" y1="192" x2="224" y2="204"/>
      <line x1="192" y1="192" x2="206" y2="224"/>
      <line x1="192" y1="192" x2="176" y2="222"/>
      <line x1="192" y1="192" x2="160" y2="200"/>
      <line x1="192" y1="192" x2="164" y2="170"/>
    </g>
  </defs>

  <rect width="256" height="256" fill="#050807"/>

  <!-- neutral hairline quadrant dividers + outer frame -->
  <g stroke="#2a3a32" stroke-opacity="0.85" stroke-width="1">
    <line x1="128" y1="8" x2="128" y2="248"/>
    <line x1="8" y1="128" x2="248" y2="128"/>
  </g>
  <rect x="8" y="8" width="240" height="240" fill="none"
        stroke="#2a3a32" stroke-width="1.5"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- P7 Green knot -->
    <use xlink:href="#g-knot" stroke="#63ffa8" stroke-width="6.6" opacity="0.8"  filter="url(#halo)"/>
    <use xlink:href="#g-knot" stroke="#baffd6" stroke-width="3.0"                filter="url(#core)"/>

    <!-- Ice Blue torus -->
    <use xlink:href="#g-torus" stroke="#59bfff" stroke-width="6.2" opacity="0.8" filter="url(#halo)"/>
    <use xlink:href="#g-torus" stroke="#b3e2ff" stroke-width="2.9"               filter="url(#core)"/>

    <!-- Amber waveform -->
    <use xlink:href="#g-wave" stroke="#ffa030" stroke-width="6.6" opacity="0.8"  filter="url(#halo)"/>
    <use xlink:href="#g-wave" stroke="#ffd39a" stroke-width="3.2"                filter="url(#core)"/>

    <!-- Vaporwave pink radial -->
    <use xlink:href="#g-radial" stroke="#ff4de0" stroke-width="5.4" opacity="0.8" filter="url(#halo)"/>
    <use xlink:href="#g-radial" stroke="#ffa6ee" stroke-width="2.6"               filter="url(#core)"/>
  </g>

  <!-- radial centre dot: pink family bright core -->
  <circle cx="185" cy="185" r="8"   fill="#ff4de0" opacity="0.7" filter="url(#dot)"/>
  <circle cx="185" cy="185" r="4.6" fill="#ffb3ef"/>
</svg>
