<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="beam-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="screen-tint" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a1a0e"/>
      <stop offset="100%" stop-color="#040a05"/>
    </radialGradient>
  </defs>

  <!-- bezel and screen -->
  <rect x="6" y="6" width="116" height="116" rx="22" fill="#1a1d1a"/>
  <rect x="14" y="14" width="100" height="100" rx="16" fill="url(#screen-tint)"/>

  <!-- graticule -->
  <g stroke="#2e7d44" stroke-width="1" opacity="0.45">
    <line x1="64" y1="16" x2="64" y2="112"/>
    <line x1="16" y1="64" x2="112" y2="64"/>
  </g>
  <g stroke="#235c34" stroke-width="0.8" opacity="0.3">
    <line x1="40" y1="16" x2="40" y2="112"/>
    <line x1="88" y1="16" x2="88" y2="112"/>
    <line x1="16" y1="40" x2="112" y2="40"/>
    <line x1="16" y1="88" x2="112" y2="88"/>
  </g>

  <!-- lissajous beam trace (3:2 figure) with phosphor glow -->
  <path d="M 64 28
           C 88 28 100 46 100 64 C 100 82 88 100 64 100
           C 40 100 28 82 28 64 C 28 46 40 28 64 28 Z"
        fill="none" stroke="#46ff79" stroke-width="3.4"
        stroke-linecap="round" filter="url(#beam-glow)" opacity="0.9"/>
  <path d="M 36 86 C 50 40 78 40 92 86"
        fill="none" stroke="#b8ffd0" stroke-width="2.6"
        stroke-linecap="round" filter="url(#beam-glow)"/>
</svg>
