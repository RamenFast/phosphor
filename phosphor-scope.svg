<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="beam-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flash-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="screen-tint" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a121a"/>
      <stop offset="100%" stop-color="#04070a"/>
    </radialGradient>
    <!-- the beam sweeps through phosphor colors: pink to violet to cyan -->
    <linearGradient id="trace-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5ad1"/>
      <stop offset="35%" stop-color="#9d6bff"/>
      <stop offset="70%" stop-color="#3ae8ff"/>
      <stop offset="100%" stop-color="#7dffb0"/>
    </linearGradient>
  </defs>

  <!-- bezel and screen -->
  <rect x="6" y="6" width="116" height="116" rx="22" fill="#1a1d1a"/>
  <rect x="14" y="14" width="100" height="100" rx="16" fill="url(#screen-tint)"/>

  <!-- graticule -->
  <g stroke="#3a6e8a" stroke-width="1" opacity="0.45">
    <line x1="64" y1="16" x2="64" y2="112"/>
    <line x1="16" y1="64" x2="112" y2="64"/>
  </g>
  <g stroke="#2c5269" stroke-width="0.8" opacity="0.3">
    <line x1="40" y1="16" x2="40" y2="112"/>
    <line x1="88" y1="16" x2="88" y2="112"/>
    <line x1="16" y1="40" x2="112" y2="40"/>
    <line x1="16" y1="88" x2="112" y2="88"/>
  </g>

